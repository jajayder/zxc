- name: Descobrir hosts na VLAN
  hosts: all
  gather_facts: false

  vars:
    subnet: "10.83.107.0/24"

  tasks:

    - name: Scan VLAN
      shell: |
        nmap -sn {{ subnet }} -oG - 2>/dev/null | awk '/Up$/{print $2}'
      register: hosts_encontrados
      changed_when: false
      failed_when: false

    - name: Criar inventário dinâmico
      add_host:
        name: "{{ item }}"
        groups: discovered
      loop: "{{ hosts_encontrados.stdout_lines }}"


    - name: listando hosts encontrados
      debug:
        msg: "Host descoberto: {{ item }}"
      loop: "{{ hosts_encontrados.stdout_lines }}"      
