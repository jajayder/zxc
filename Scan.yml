- name: Descobrir hosts na VLAN
  hosts: localhost
  gather_facts: false

  vars:
    subnet: "10.83.107.0/24"

  tasks:

    - name: Scan VLAN
      shell: |
        nmap -sn {{ subnet }} -oG - 2>/dev/null | awk '/Up$/{print $2}'
      register: hosts_encontrados
      changed_when: false
      failed_when: false

    - name: Criar inventário dinâmico
      add_host:
        name: "{{ item }}"
        groups: discovered
      loop: "{{ hosts_encontrados.stdout_lines }}"

- name: resolvendo nome
  hosts: hosts_encontrados
  gather_facts: true

  tasks:
    - name: DNS
      delegate_to: localhost
      shell: 'dig -x {{ inventory_hostname }} +short | sed "s/\.$//"'
      register: dns_name
      failed_when: false

    - name: salvando hostname
      set_fact:
        discovered_hostname: "{{ dns_name.stdout | default(inventory_hostname) }}"



- name: Identificar hosts
  hosts: discovered
  gather_facts: false

  tasks:

    - name: Testa Winrm
      delegate_to: localhost
      wait_for:
        host: "{{ inventory_hostname }}"
        port: 5985
        timeout: 2
      register: winrm_test
      ignore_errors: yes

    - name: Add Win
      add_host:
        name: "{{ inventory_hostname }}"
        groups: windows_hosts
      when: not winrm_test.failed

    - name: Add candidatos linus
      add_host:
        name: "{{ inventory_hostname }}"
        groups: linux_cand
      when: winrm_test.failed

- name: Linux Detect
  hosts: linux_cand
  gather_facts: false

  tasks:

    - name: SSH test
      delegate_to: localhost
      wait_for:
        host: "{{ inventory_hostname }}"
        post: 22
        timeout: 3
      register: ssh_test
      ignore_errors: yes

    - name: Adicionando Linux
      add_host:
        name: "{{ inventory_hostname }}"
        groups: linux_hosts
      when: not ssh_test.failed        

- name: Inventario Windows
  hosts: windows_hosts
  gather_facts: true

  vars:
    ansible_connection: winrm
    ansible_winrm_transport: ntlm
    ansible_port: 5895

  tasks:

    - name: Monstar Inventario Windows
      set_fact:
        inventario:
          hostname: "{{ ansible_hostname }}"
          fqdn: "{{ ansible_fqdn }}"
          ip: "{{ ansible_default_ipva4.address }}"
          mac: "{{ ansible_default_ipva4.macaddress }}"
          os: "{{ ansible_distribution }}"
          os_versao: "{{ ansible_distribution_version }}"
          cpu: "{{ ansible_processor_vcpus }}"
          memoria: "{{ ansible_memtotal_mb }}"
          fabricante: "{{ ansible_system_vendor }}"
          modelo: "{{ ansible_product_name }}"
          serial: "{{ ansible_product_serial }}"
          domain: "{{ ansible_domain }}"

- name: Inventario Linux
  hosts: linux_hosts
  gather_facts: true

  tasks:

    - name: Monstar Inventario Windows
      set_fact:
        inventario:
          hostname: "{{ ansible_hostname }}"
          fqdn: "{{ ansible_fqdn }}"
          ip: "{{ ansible_default_ipva4.address }}"
          mac: "{{ ansible_default_ipva4.macaddress }}"
          os: "{{ ansible_distribution }}"
          os_versao: "{{ ansible_distribution_version }}"
          cpu: "{{ ansible_processor_vcpus }}"
          memoria: "{{ ansible_memtotal_mb }}"
          fabricante: "{{ ansible_system_vendor }}"
          modelo: "{{ ansible_product_name }}"
          serial: "{{ ansible_product_serial }}"
          domain: "{{ ansible_domain }}"

- name: CSV
  hosts: localhost
  gather_facts: false

  tasks:
    - copy:
        dest: /files/invent_hosts.csv
        content: |
          hostname,fqdn,ip,mac,os,os_versao,cpu,memoria,fabricante,modelo,serial,domais
          {% for host in groups['linux_hosts'] + groups['win_hosts'] %}
          {{ hostvars[host].inventario.hostname }},
          {{ hostvars[host].inventario.fqdn }},
          {{ hostvars[host].inventario.ip }},
          {{ hostvars[host].inventario.mac }},
          {{ hostvars[host].inventario.os }},
          {{ hostvars[host].inventario.os_versao }},
          {{ hostvars[host].inventario.cpu }},
          {{ hostvars[host].inventario.memoria }},
          {{ hostvars[host].inventario.fabricante }},
          {{ hostvars[host].inventario.modelo }},
          {{ hostvars[host].inventario.serial }},
          {{ hostvars[host].inventario.domais }}
          {% endfor %}
